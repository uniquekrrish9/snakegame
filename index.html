<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game - Bootstrap 5</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .game-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 520px;
    }

    .title {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-align: center;
    }

    .score-box {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 600;
    }

    canvas {
      background: #111827;
      border: 4px solid #22c55e;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }

    .controls {
      color: #cbd5e1;
      font-size: 0.95rem;
      text-align: center;
      margin-top: 15px;
    }

    .btn-custom {
      border-radius: 12px;
      font-weight: 600;
      padding: 10px 18px;
    }

    .game-over {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border-radius: 20px;
      color: white;
      text-align: center;
    }

    .mobile-buttons button {
      width: 65px;
      height: 65px;
      font-size: 1.3rem;
      border-radius: 15px;
    }

    @media (max-width: 576px) {
      canvas {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center">
    <div class="game-card position-relative">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="score-box">Score: <span id="score">0</span></div>
        <button class="btn btn-success btn-custom" id="restartBtn">
          Restart
        </button>
      </div>

      <h1 class="title mb-4">🐍 Snake Game</h1>

      <canvas id="gameCanvas" width="400" height="400"></canvas>

      <div class="controls">
        Use Arrow Keys or Mobile Buttons to Control the Snake
      </div>

      <!-- Mobile Controls -->
      <div class="mobile-buttons mt-4 d-flex flex-column align-items-center gap-2">
        <button class="btn btn-primary" onclick="changeDirection('UP')">⬆</button>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" onclick="changeDirection('LEFT')">⬅</button>
          <button class="btn btn-primary" onclick="changeDirection('DOWN')">⬇</button>
          <button class="btn btn-primary" onclick="changeDirection('RIGHT')">➡</button>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div class="game-over" id="gameOver">
        <h2 class="mb-3">💀 Game Over</h2>
        <p class="mb-3">Your Score: <span id="finalScore">0</span></p>
        <button class="btn btn-warning btn-lg" onclick="restartGame()">
          Play Again
        </button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const box = 20;
    const canvasSize = 400;

    let snake;
    let direction;
    let food;
    let score;
    let game;

    function initGame() {
      snake = [
        { x: 9 * box, y: 10 * box },
      ];

      direction = 'RIGHT';

      food = {
        x: Math.floor(Math.random() * 20) * box,
        y: Math.floor(Math.random() * 20) * box,
      };

      score = 0;
      document.getElementById('score').innerText = score;
      document.getElementById('gameOver').style.display = 'none';

      if (game) clearInterval(game);
      game = setInterval(drawGame, 120);
    }

    function drawGame() {
      // Background
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x + box / 2, food.y + box / 2, box / 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? '#22c55e' : '#4ade80';
        ctx.fillRect(snake[i].x, snake[i].y, box - 2, box - 2);
      }

      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      if (direction === 'LEFT') snakeX -= box;
      if (direction === 'UP') snakeY -= box;
      if (direction === 'RIGHT') snakeX += box;
      if (direction === 'DOWN') snakeY += box;

      // Eat Food
      if (snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById('score').innerText = score;

        food = {
          x: Math.floor(Math.random() * 20) * box,
          y: Math.floor(Math.random() * 20) * box,
        };
      } else {
        snake.pop();
      }

      const newHead = {
        x: snakeX,
        y: snakeY,
      };

      // Collision
      if (
        snakeX < 0 ||
        snakeY < 0 ||
        snakeX >= canvasSize ||
        snakeY >= canvasSize ||
        collision(newHead, snake)
      ) {
        clearInterval(game);
        showGameOver();
        return;
      }

      snake.unshift(newHead);
    }

    function collision(head, array) {
      for (let i = 0; i < array.length; i++) {
        if (head.x === array[i].x && head.y === array[i].y) {
          return true;
        }
      }
      return false;
    }

    document.addEventListener('keydown', (event) => {
      const key = event.key;

      if (key === 'ArrowLeft' && direction !== 'RIGHT') {
        direction = 'LEFT';
      } else if (key === 'ArrowUp' && direction !== 'DOWN') {
        direction = 'UP';
      } else if (key === 'ArrowRight' && direction !== 'LEFT') {
        direction = 'RIGHT';
      } else if (key === 'ArrowDown' && direction !== 'UP') {
        direction = 'DOWN';
      }
    });

    function changeDirection(dir) {
      if (dir === 'LEFT' && direction !== 'RIGHT') {
        direction = 'LEFT';
      }
      if (dir === 'UP' && direction !== 'DOWN') {
        direction = 'UP';
      }
      if (dir === 'RIGHT' && direction !== 'LEFT') {
        direction = 'RIGHT';
      }
      if (dir === 'DOWN' && direction !== 'UP') {
        direction = 'DOWN';
      }
    }

    function showGameOver() {
      document.getElementById('finalScore').innerText = score;
      document.getElementById('gameOver').style.display = 'flex';
    }

    function restartGame() {
      initGame();
    }

    document
      .getElementById('restartBtn')
      .addEventListener('click', restartGame);

    initGame();
  </script>
</body>
</html>
